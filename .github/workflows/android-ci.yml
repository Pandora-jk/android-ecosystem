name: Android CI

on:
  push:
    branches: [ "master", "main", "feat/**" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
      release_body: ${{ steps.meta.outputs.release_body }}
      apk_name: ${{ steps.meta.outputs.apk_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          branch_name="${GITHUB_REF_NAME}"
          branch_slug="$(printf '%s' "${branch_name}" | tr '[:upper:]' '[:lower:]' | sed -E 's#[^a-z0-9]+#-#g; s#(^-|-$)##g')"
          base_version="0.0.${GITHUB_RUN_NUMBER}"
          attempt="$(printf '%02d' "${GITHUB_RUN_ATTEMPT}")"
          short_sha="${GITHUB_SHA::7}"

          if [[ "${branch_name}" == "master" || "${branch_name}" == "main" ]]; then
            release_tag="contacts-alpha-${base_version}"
            release_name="Contacts alpha ${base_version}"
            apk_name="${release_tag}.apk"
            release_body="Automated alpha release from ${branch_name} (${short_sha})."
          else
            branch_suffix="${branch_slug#feat-}"
            release_tag="contacts-alpha-${base_version}-test-${branch_suffix}.${attempt}"
            release_name="Contacts alpha test ${branch_suffix} ${base_version}"
            apk_name="${release_tag}.apk"
            release_body="Automated alpha test release from ${branch_name} (${short_sha})."
          fi

          {
            echo "release_tag=${release_tag}"
            echo "release_name=${release_name}"
            echo "release_body=${release_body}"
            echo "apk_name=${apk_name}"
          } >> "${GITHUB_OUTPUT}"

      - name: Prepare release signing
        if: github.event_name == 'push'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for key in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [[ -z "${!key:-}" ]]; then
              echo "::error::Missing required GitHub secret: ${key}"
              missing=1
            fi
          done

          if [[ "${missing}" -ne 0 ]]; then
            echo "Configure the Android signing secrets before using branch-push releases for Obtanium." >&2
            exit 1
          fi

          mkdir -p signing
          printf '%s' "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > signing/release.keystore
          cat > keystore.properties <<EOF
          storeFile=signing/release.keystore
          storePassword=${ANDROID_KEYSTORE_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          keyPassword=${ANDROID_KEY_PASSWORD}
          EOF

      - name: Build Contacts release APK
        run: ./gradlew --no-daemon --console=plain :apps:contacts:assembleRelease

      - name: Collect release APK
        shell: bash
        run: |
          set -euo pipefail
          apk_path="$(find apps/contacts/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' | head -n 1)"
          if [[ -z "${apk_path}" ]]; then
            echo "::error::Release APK not found in apps/contacts/build/outputs/apk/release"
            exit 1
          fi
          mkdir -p dist
          cp "${apk_path}" "dist/${{ steps.meta.outputs.apk_name }}"

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: contacts-release-apk
          path: dist/*.apk
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Download release APK
        uses: actions/download-artifact@v4
        with:
          name: contacts-release-apk
          path: dist

      - name: Publish prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.release_tag }}
          name: ${{ needs.build.outputs.release_name }}
          body: ${{ needs.build.outputs.release_body }}
          files: dist/*.apk
          target_commitish: ${{ github.sha }}
          prerelease: true
          generate_release_notes: false
          fail_on_unmatched_files: true
