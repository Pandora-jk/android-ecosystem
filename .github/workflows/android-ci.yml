name: Android CI
on:
  push:
    branches: [ "master", "main", "feat/**" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.7

      - name: Build with Gradle
        run: ./gradlew build

      - name: Build Debug APK
        run: ./gradlew :apps:contacts:assembleDebug

      - name: Build Release APK
        run: ./gradlew :apps:contacts:assembleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/feat/'))
        with:
          name: contacts-debug-apk
          path: apps/contacts/build/outputs/apk/debug/contacts-*-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/feat/'))
        with:
          name: contacts-release-apk
          path: apps/contacts/build/outputs/apk/release/contacts-*.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: contacts-release-apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: contacts-*.apk
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
